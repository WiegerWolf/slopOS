<svg viewBox="0 0 512 512" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 
      THE ARCHITECTURE GRADIENT
      Bottom (Pink): The raw, fluid generative AI "Slop"
      Middle (Purple): The Bridge / Runtime
      Top (Cyan): The crisp, materialized OS Surface
    -->
    <linearGradient id="slopOSGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF2E93" />
      <stop offset="45%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#00D2FF" />
    </linearGradient>

    <!-- Colored Premium Drop Shadow for the freeform icon -->
    <filter id="iconShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#8B5CF6" flood-opacity="0.4" />
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>

    <!-- Intense Glow for the AI Invocation Spark -->
    <filter id="sparkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="24" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft highlight for the glass UI elements -->
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- 
    THE SILHOUETTE
    A single, highly distinctive freeform shape.
    Top Half: A perfectly rigid, crisp OS window (Structure).
    Bottom Half: A sweeping, organic droplet (The Generative Slop).
    Reads instantly at 16x16 or 512x512.
  -->
  <g filter="url(#iconShadow)">
    <path d="
      M 104,220 
      L 104,128 
      A 24,24 0 0 1 128,104 
      L 384,104 
      A 24,24 0 0 1 408,128 
      L 408,220 
      C 408,360 480,456 256,456 
      C 32,456 104,360 104,220 
      Z" 
      fill="url(#slopOSGrad)" 
    />
    
    <!-- Premium Inner Glass Stroke -->
    <path d="
      M 104,220 
      L 104,128 
      A 24,24 0 0 1 128,104 
      L 384,104 
      A 24,24 0 0 1 408,128 
      L 408,220 
      C 408,360 480,456 256,456 
      C 32,456 104,360 104,220 
      Z" 
      fill="none" 
      stroke="#ffffff" 
      stroke-width="3" 
      stroke-opacity="0.4" 
    />
  </g>

  <!-- 
    MATERIALIZED OS SURFACES
    Crisp UI elements perfectly aligned in the rigid top half.
  -->
  <g>
    <!-- Window Header Divider -->
    <line x1="104" y1="152" x2="408" y2="152" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3" />
    
    <!-- Classic Window Controls (Creates instant "OS" recognition at small sizes) -->
    <circle cx="132" cy="128" r="6" fill="#ffffff" opacity="0.9" />
    <circle cx="156" cy="128" r="6" fill="#ffffff" opacity="0.6" />
    <circle cx="180" cy="128" r="6" fill="#ffffff" opacity="0.6" />

    <!-- Generated TSX Surface Card 1 (Chronicle / Workspace) -->
    <rect x="124" y="168" width="80" height="120" rx="12" fill="url(#glassFill)" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5" />
    <rect x="136" y="184" width="32" height="4" rx="2" fill="#ffffff" opacity="0.5" />
    <circle cx="140" cy="204" r="4" fill="#ffffff" opacity="0.7" />
    <circle cx="140" cy="224" r="4" fill="#ffffff" opacity="0.4" />
    <circle cx="140" cy="244" r="4" fill="#ffffff" opacity="0.4" />
    <circle cx="140" cy="264" r="4" fill="#ffffff" opacity="0.2" />

    <!-- Generated TSX Surface Card 2 (Active Tool / Inspector) -->
    <rect x="220" y="168" width="168" height="120" rx="12" fill="url(#glassFill)" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5" />
    
    <!-- Internal structured layout (Fact grid / badges) -->
    <rect x="236" y="184" width="28" height="28" rx="8" fill="#ffffff" opacity="0.8" />
    <rect x="276" y="190" width="80" height="6" rx="3" fill="#ffffff" opacity="0.9" />
    <rect x="276" y="204" width="48" height="4" rx="2" fill="#ffffff" opacity="0.5" />
    
    <rect x="236" y="228" width="136" height="44" rx="6" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" />
    <rect x="248" y="240" width="60" height="4" rx="2" fill="#ffffff" opacity="0.6" />
    <rect x="248" y="252" width="40" height="4" rx="2" fill="#ffffff" opacity="0.3" />
  </g>

  <!-- 
    THE PROMPT / AI INVOCATION
    Replacing the generic ">_" with a pure, brilliant generative spark
    that sits in the "belly" of the slop, powering the UI generation above it.
  -->
  <g filter="url(#sparkGlow)">
    <!-- Main 4-point AI Star -->
    <path d="M256,320 
             C256,360 270,374 310,374 
             C270,374 256,388 256,428 
             C256,388 242,374 202,374 
             C242,374 256,360 256,320 Z" 
          fill="#ffffff" />
    <!-- Core Brightness -->
    <circle cx="256" cy="374" r="6" fill="#ffffff" />
  </g>

</svg>