<svg viewBox="0 0 512 512" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient (The Calm Canvas) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Slop Gradient 1 (Vibrant AI Core) -->
    <linearGradient id="slop1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <!-- Slop Gradient 2 (Depth & Fluidity) -->
    <linearGradient id="slop2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <!-- Glow & Shadow Filters -->
    <filter id="blobGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="promptShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Subtle Terminal Grid Pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#FFFFFF" opacity="0.03" />
    </pattern>
  </defs>

  <!-- Base Squircle -->
  <rect width="512" height="512" rx="116" fill="url(#bgGrad)" />
  <rect width="512" height="512" rx="116" fill="url(#dots)" />

  <!-- Inner Edge Highlight -->
  <rect x="2" y="2" width="508" height="508" rx="114" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2" />

  <!-- The "Slop" (Generative AI materializing) -->
  <g filter="url(#blobGlow)">
    <!-- Main organic fluid blob -->
    <path d="M 345,130 C 400,160 440,240 405,320 C 370,400 260,420 180,380 C 100,340 90,230 130,160 C 170,90 290,100 345,130 Z" 
          fill="url(#slop1)" opacity="0.95" />
          
    <!-- Secondary inner fluid wave -->
    <path d="M 330,170 C 380,190 390,270 360,330 C 330,390 250,380 190,340 C 130,300 120,210 170,160 C 220,110 280,150 330,170 Z" 
          fill="url(#slop2)" opacity="0.8" />
  </g>

  <!-- The Command-First Invocation (>_) -->
  <!-- Represents the precision of the OS cutting through/shaping the AI Slop -->
  <g filter="url(#promptShadow)" stroke="#FFFFFF" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Bracket ">" -->
    <path d="M 136 160 L 246 256 L 136 352" />
    <!-- Cursor "_" -->
    <path d="M 276 352 L 376 352" />
  </g>
</svg>